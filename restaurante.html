<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>GG Express — Empresa</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#060608;--s1:#0e0e12;--s2:#16161c;
  --border:rgba(255,255,255,.07);--border2:rgba(255,255,255,.12);
  --accent:#ff6b35;--accent2:#e5571e;--accent-dim:rgba(255,107,53,.12);
  --green:#00d4a0;--green-dim:rgba(0,212,160,.12);
  --blue:#4d9fff;--blue-dim:rgba(77,159,255,.12);
  --yellow:#ffd166;--yellow-dim:rgba(255,209,102,.12);
  --red:#ff4d6d;--red-dim:rgba(255,77,109,.12);
  --text:#f0ede8;--text2:#9994a8;--text3:#5a5568;
  --font:'Plus Jakarta Sans',sans-serif;--r:12px;--r2:16px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh}
#login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
.login-box{width:100%;max-width:420px;background:var(--s1);border:1px solid var(--border);border-radius:20px;padding:40px}
.login-logo{text-align:center;margin-bottom:30px}
.login-logo .mark{width:52px;height:52px;background:var(--accent);border-radius:14px;display:flex;align-items:center;justify-content:center;margin:0 auto 12px;font-size:24px}
.login-logo h1{font-size:21px;font-weight:800;letter-spacing:-.5px}
.login-logo h1 span{color:var(--accent)}
.login-logo p{font-size:13px;color:var(--text2);margin-top:4px}
.field{margin-bottom:13px}
.field label{display:block;font-size:12px;color:var(--text2);text-transform:uppercase;letter-spacing:.6px;margin-bottom:6px}
.field input,.field select{width:100%;background:var(--s2);border:1px solid var(--border);border-radius:10px;padding:12px 14px;color:var(--text);font-family:var(--font);font-size:14px;outline:none;transition:border-color .2s}
.field input:focus,.field select:focus{border-color:var(--accent)}
.field select option{background:var(--s2)}
.btn-full{width:100%;padding:13px;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;border:none;font-family:var(--font);transition:all .2s}
.btn-accent{background:var(--accent);color:#fff}.btn-accent:hover{background:var(--accent2)}
.login-err{color:var(--red);font-size:13px;text-align:center;margin-bottom:12px;display:none;padding:9px;background:var(--red-dim);border-radius:8px}
#app{display:none}
header{background:var(--s1);border-bottom:1px solid var(--border);padding:0 22px;height:62px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.logo{font-size:17px;font-weight:800;letter-spacing:-.3px}.logo span{color:var(--accent)}
.rest-badge{background:var(--accent-dim);border:1px solid rgba(255,107,53,.3);color:var(--accent);padding:5px 13px;border-radius:20px;font-size:12px;font-weight:600}
.tabs{display:flex;border-bottom:1px solid var(--border);background:var(--s1);padding:0 22px}
.tab{padding:14px 15px;font-size:13px;font-weight:600;color:var(--text2);cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;border-top:none;border-left:none;border-right:none;background:transparent;font-family:var(--font)}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.container{max-width:1100px;margin:0 auto;padding:26px 22px}
.screen{display:none}.screen.active{display:block}
.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:22px}
.stat{background:var(--s1);border:1px solid var(--border);border-radius:var(--r2);padding:16px}
.stat-n{font-size:26px;font-weight:800;letter-spacing:-1px}.stat-l{font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-top:3px}
.grid-layout{display:grid;grid-template-columns:350px 1fr;gap:22px;align-items:start}
@media(max-width:800px){.grid-layout{grid-template-columns:1fr}}
.card{background:var(--s1);border:1px solid var(--border);border-radius:var(--r2);padding:20px}
.card-title{font-size:13px;font-weight:700;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.card-title .ico{width:28px;height:28px;border-radius:7px;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.form-group{margin-bottom:12px}
.form-group label{display:block;font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px}
.form-group input,.form-group textarea{width:100%;background:var(--s2);border:1px solid var(--border);border-radius:9px;padding:10px 12px;color:var(--text);font-family:var(--font);font-size:13px;outline:none;transition:border-color .2s}
.form-group input:focus,.form-group textarea:focus{border-color:var(--accent)}
.form-group textarea{height:66px;resize:none}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;padding:10px 16px;border-radius:9px;font-size:13px;font-weight:600;cursor:pointer;border:none;font-family:var(--font);transition:all .2s}
.btn-primary{background:var(--accent);color:#fff;width:100%}.btn-primary:hover{background:var(--accent2)}
.btn-sm{padding:6px 11px;font-size:12px;border-radius:7px}
.btn-green{background:var(--green-dim);color:var(--green);border:1px solid rgba(0,212,160,.3)}.btn-green:hover{background:rgba(0,212,160,.2)}
.btn-ghost{background:var(--s2);color:var(--text2);border:1px solid var(--border)}.btn-ghost:hover{color:var(--text)}
.section-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--text3);margin-bottom:11px}
.pedido-item{background:var(--s2);border:1px solid var(--border);border-radius:var(--r);padding:13px;margin-bottom:9px;transition:border-color .2s}
.pedido-item.chamando{border-color:rgba(77,159,255,.3)}.pedido-item.em-coleta{border-color:rgba(255,107,53,.3)}.pedido-item.em-rota{border-color:rgba(0,212,160,.3)}
.p-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:7px}
.p-cliente{font-size:14px;font-weight:700}.p-end{font-size:12px;color:var(--text2);margin-top:2px}
.p-itens{font-size:12px;color:var(--text2);margin:5px 0 9px}
.p-moto{font-size:12px;color:var(--green);margin-bottom:9px;display:flex;align-items:center;gap:5px}
.p-actions{display:flex;gap:7px;flex-wrap:wrap}
.badge{display:inline-flex;align-items:center;gap:4px;padding:4px 9px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap}
.b-yellow{background:var(--yellow-dim);color:var(--yellow)}.b-blue{background:var(--blue-dim);color:var(--blue)}
.b-green{background:var(--green-dim);color:var(--green)}.b-orange{background:var(--accent-dim);color:var(--accent)}.b-gray{background:rgba(255,255,255,.05);color:var(--text3)}
.pulse{width:6px;height:6px;border-radius:50%;background:var(--green);display:inline-block;position:relative}
.pulse::after{content:'';position:absolute;inset:-3px;border-radius:50%;border:1.5px solid var(--green);animation:ring 1.5s infinite}
@keyframes ring{0%{opacity:1;transform:scale(1)}100%{opacity:0;transform:scale(2.2)}}
.empty{text-align:center;padding:36px 20px;color:var(--text3)}.empty-ico{font-size:34px;margin-bottom:9px;opacity:.3}
table{width:100%;border-collapse:collapse}
th{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--text3);padding:9px 11px;text-align:left;border-bottom:1px solid var(--border)}
td{padding:10px 11px;font-size:13px;border-bottom:1px solid var(--border);color:var(--text2)}
td.name{color:var(--text);font-weight:600}
tr:last-child td{border-bottom:none}
.report-box{background:var(--s2);border:1px solid var(--border);border-radius:var(--r);padding:15px;margin-bottom:11px}
.report-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--border)}
.report-row:last-child{border-bottom:none}
.r-key{font-size:13px;color:var(--text2)}.r-val{font-size:13px;font-weight:700;color:var(--text)}
.pix-box{background:var(--s2);border:1px solid var(--border);border-radius:12px;padding:14px;margin-top:12px}
.pix-key{font-size:14px;font-weight:700;color:var(--text);word-break:break-all;margin:6px 0 10px}
#toast{position:fixed;bottom:22px;right:22px;z-index:999;background:var(--s1);border:1px solid var(--green);color:var(--green);padding:10px 17px;border-radius:10px;font-size:13px;font-weight:500;transform:translateY(80px);opacity:0;transition:all .3s;pointer-events:none}
#toast.show{transform:translateY(0);opacity:1}
#toast.err{border-color:var(--red);color:var(--red)}
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">
      <div class="mark">🍃</div>
      <h1>GG <span>Express</span></h1>
      <p>Acesso da Empresa</p>
    </div>
    <div id="login-err" class="login-err">Usuário ou senha incorretos</div>
    <div class="field"><label>Usuário</label><input type="text" id="inp-usuario" placeholder="Seu usuário de acesso"></div>
    <div class="field"><label>Senha</label><input type="password" id="inp-senha" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()"></div>
    <button class="btn-full btn-accent" onclick="doLogin()">Entrar</button>
  </div>
</div>

<div id="app">
  <header>
    <div class="logo">GG <span>Express</span></div>
    <div style="display:flex;align-items:center;gap:11px">
      <div class="rest-badge" id="rest-badge">—</div>
      <button class="btn btn-ghost btn-sm" onclick="logout()">Sair</button>
    </div>
  </header>
  <div class="tabs">
    <button class="tab active" onclick="showTab('pedidos',this)">Pedidos</button>
    <button class="tab" onclick="showTab('entregues',this)">Entregues hoje</button>
    <button class="tab" onclick="showTab('relatorio',this)">Relatório</button>
  </div>
  <div class="container">

    <div id="tab-pedidos" class="screen active">
      <div class="stats-row">
        <div class="stat"><div class="stat-n" style="color:var(--accent)" id="s-ativos">0</div><div class="stat-l">Em aberto</div></div>
        <div class="stat"><div class="stat-n" style="color:var(--blue)" id="s-rota">0</div><div class="stat-l">Em rota</div></div>
        <div class="stat"><div class="stat-n" style="color:var(--green)" id="s-entregues">0</div><div class="stat-l">Entregues hoje</div></div>
      </div>
      <div class="grid-layout">
        <div class="card">
          <div class="card-title"><div class="ico">+</div>Novo pedido</div>
          <div class="form-group"><label>Nome do cliente</label><input type="text" id="inp-cliente" placeholder="Ex: João Silva"></div>
          <div class="form-group"><label>Endereço de entrega</label><input type="text" id="inp-end" placeholder="Rua, número, bairro"></div>
          <div class="form-group"><label>Itens do pedido</label><textarea id="inp-itens" placeholder="Ex: 2x Hamburguer, 1x Suco"></textarea></div>
          <div class="form-group"><label>Observação para o motoboy</label><textarea id="inp-obs" placeholder="Ex: tocar interfone, retirar no caixa, cuidado com bebida"></textarea></div>
          <button class="btn btn-primary" onclick="criarPedido()">+ Criar pedido</button>
        </div>
        <div>
          <div class="section-label">Pedidos ativos</div>
          <div id="lista-pedidos-ativos"></div>
        </div>
      </div>
    </div>

    <div id="tab-entregues" class="screen">
      <div class="card">
        <div class="card-title"><div class="ico" style="background:var(--green)">✓</div>Entregues hoje</div>
        <div style="overflow-x:auto">
          <table>
            <thead><tr><th>Horário</th><th>Cliente</th><th>Endereço</th><th>Motoboy</th></tr></thead>
            <tbody id="tab-entregues-body"></tbody>
          </table>
        </div>
      </div>
    </div>

    <div id="tab-relatorio" class="screen">
      <div class="card" style="margin-bottom:18px">
        <div style="display:grid;grid-template-columns:1fr 1fr auto;gap:12px;align-items:end">
          <div class="form-group" style="margin:0"><label>Data inicial</label><input type="date" id="r-ini"></div>
          <div class="form-group" style="margin:0"><label>Data final</label><input type="date" id="r-fim"></div>
          <button class="btn btn-primary" onclick="renderRelatorio()">Gerar</button>
        </div>
        <div style="display:flex;gap:7px;margin-top:11px;flex-wrap:wrap">
          <button class="btn btn-ghost btn-sm" onclick="rPeriodo('hoje')">Hoje</button>
          <button class="btn btn-ghost btn-sm" onclick="rPeriodo('semana')">Esta semana</button>
          <button class="btn btn-ghost btn-sm" onclick="rPeriodo('mes')">Este mês</button>
          <button class="btn btn-ghost btn-sm" onclick="rPeriodo('mes-passado')">Mês passado</button>
        </div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:18px">
        <div class="card">
          <div class="card-title"><div class="ico" style="background:var(--blue)">📊</div>Resumo</div>
          <div id="rel-resumo"></div>
        </div>
        <div class="card">
          <div class="card-title"><div class="ico" style="background:var(--green)">🛵</div>Por motoboy</div>
          <div id="rel-por-moto"></div>
        </div>
      </div>
      <div class="card" style="margin-top:18px">
        <div class="card-title"><div class="ico">📋</div>Detalhamento</div>
        <div style="overflow-x:auto">
          <table>
            <thead><tr><th>Data/Hora</th><th>Cliente</th><th>Endereço</th><th>Motoboy</th></tr></thead>
            <tbody id="rel-detalhe-body"></tbody>
          </table>
        </div>
      </div>
    </div>

  </div>
</div>

<div id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, push, onValue, update } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
import firebaseConfig from "./firebase-config.js";

const app = initializeApp(firebaseConfig);
const db  = getDatabase(app);

const REPASSE_EMPRESA = 9.5;
const REPASSE_MOTOBOY = 7.5;
const LUCRO_GG = 2.0;
const PIX_GG = 'cobrancaggexpress@gmail.com';

let restAtual=null, pedidos=[];

window.doLogin = function() {
  const usuario=document.getElementById('inp-usuario').value.trim().toLowerCase();
  const senha=document.getElementById('inp-senha').value;
  if(!usuario||!senha){showErr('Preencha usuário e senha');return;}
  onValue(ref(db,'Empresas'),snap=>{
    const d=snap.val()||{};
    const rest=Object.entries(d).map(([id,v])=>({id,...v})).find(r=>r.usuario===usuario&&r.senha===senha);
    if(rest){
      restAtual=rest;
      document.getElementById('login-screen').style.display='none';
      document.getElementById('app').style.display='block';
      document.getElementById('rest-badge').textContent=rest.nome;
      iniciar();
    } else {
      showErr('Usuário ou senha incorretos');
    }
  },{onlyOnce:true});
};

window.logout=function(){
  restAtual=null;
  document.getElementById('login-screen').style.display='flex';
  document.getElementById('app').style.display='none';
  document.getElementById('inp-usuario').value='';
  document.getElementById('inp-senha').value='';
};

function iniciar(){
  onValue(ref(db,'pedidos'),snap=>{
    const d=snap.val()||{};
    pedidos=Object.entries(d).map(([id,v])=>({id,...v})).filter(p=>p.restId===restAtual.id).sort((a,b)=>(b.criadoEm||0)-(a.criadoEm||0));
    renderStats();renderPedidos();renderEntregues();renderRelatorio();
  });
}

function renderStats(){
  const hoje=new Date();hoje.setHours(0,0,0,0);
  document.getElementById('s-ativos').textContent=pedidos.filter(p=>!['entregue','cancelado'].includes(p.status)).length;
  document.getElementById('s-rota').textContent=pedidos.filter(p=>['em-coleta','em-rota'].includes(p.status)).length;
  document.getElementById('s-entregues').textContent=pedidos.filter(p=>p.status==='entregue'&&(p.criadoEm||0)>=hoje.getTime()).length;
}

function renderPedidos(){
  const ativos=pedidos.filter(p=>!['entregue','cancelado'].includes(p.status));
  const el=document.getElementById('lista-pedidos-ativos');
  if(!ativos.length){el.innerHTML='<div class="empty"><div class="empty-ico">🍔</div><div>Nenhum pedido em aberto</div></div>';return;}
  const bm={aguardando:'b-yellow',chamando:'b-blue','em-coleta':'b-orange','em-rota':'b-green',entregue:'b-gray'};
  const lm={aguardando:'Aguardando',chamando:'Chamando motoboy','em-coleta':'Indo buscar','em-rota':'Em rota',entregue:'Entregue'};
  el.innerHTML=ativos.map(p=>`
    <div class="pedido-item ${p.status}">
      <div class="p-top">
        <div><div class="p-cliente">${p.cliente}</div><div class="p-end">📍 ${p.endereco}</div></div>
        <span class="badge ${bm[p.status]||'b-gray'}">${lm[p.status]||p.status}</span>
      </div>
      <div class="p-itens">${p.itens}</div>
      
      ${p.motoNome?`<div class="p-moto"><span class="pulse"></span>${p.motoNome}</div>`:''}
      <div class="p-actions">
        ${p.status==='aguardando'?`<button class="btn btn-green btn-sm" onclick="chamarMotoboys('${p.id}')">🛵 Chamar motoboys</button>`:''}
        ${p.status==='chamando'?`<button class="btn btn-ghost btn-sm" disabled>Aguardando aceite...</button>`:''}
        ${p.status==='em-coleta'?`<button class="btn btn-ghost btn-sm" disabled>Motoboy indo buscar...</button>`:''}
        ${p.status==='em-rota'?`<button class="btn btn-ghost btn-sm" disabled>Em rota 🚀</button>`:''}
      </div>
    </div>`).join('');
}

function renderEntregues(){
  const hoje=new Date();hoje.setHours(0,0,0,0);
  const ent=pedidos.filter(p=>p.status==='entregue'&&(p.criadoEm||0)>=hoje.getTime());
  const tb=document.getElementById('tab-entregues-body');
  if(!ent.length){tb.innerHTML='<tr><td colspan="4" style="text-align:center;color:var(--text3);padding:28px">Nenhuma entrega hoje</td></tr>';return;}
  tb.innerHTML=ent.map(p=>{
    const dt=new Date(p.criadoEm);
    const hora=dt.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
    return `<tr><td>${hora}</td><td class="name">${p.cliente}</td><td>${p.endereco}</td><td>${p.motoNome||'—'}</td></tr>`;
  }).join('');
}

window.rPeriodo=function(p){
  const hoje=new Date();const fmt=d=>d.toISOString().slice(0,10);
  let ini,fim;
  if(p==='hoje'){ini=fim=fmt(hoje);}
  else if(p==='semana'){const d=new Date(hoje);d.setDate(d.getDate()-d.getDay());ini=fmt(d);fim=fmt(hoje);}
  else if(p==='mes'){ini=fmt(new Date(hoje.getFullYear(),hoje.getMonth(),1));fim=fmt(hoje);}
  else if(p==='mes-passado'){const m=hoje.getMonth()-1;const ano=m<0?hoje.getFullYear()-1:hoje.getFullYear();const mes=m<0?11:m;ini=fmt(new Date(ano,mes,1));fim=fmt(new Date(ano,mes+1,0));}
  document.getElementById('r-ini').value=ini;document.getElementById('r-fim').value=fim;
  renderRelatorio();
};

window.renderRelatorio=function(){
  const iniStr=document.getElementById('r-ini').value;
  const fimStr=document.getElementById('r-fim').value;
  let lista=[...pedidos].filter(p=>p.status==='entregue');
  if(iniStr)lista=lista.filter(p=>(p.criadoEm||0)>=new Date(iniStr+'T00:00:00').getTime());
  if(fimStr)lista=lista.filter(p=>(p.criadoEm||0)<=new Date(fimStr+'T23:59:59').getTime());

  const totalGG = lista.length * REPASSE_EMPRESA;
  const periodo=iniStr&&fimStr?`${iniStr.split('-').reverse().join('/')} a ${fimStr.split('-').reverse().join('/')}`:'todo o período';
  const pagamentoConfirmado = lista.length>0 && lista.every(p=>p.restPago===true);

  document.getElementById('rel-resumo').innerHTML=`
    <div class="report-box">
      <div class="report-row"><span class="r-key">Período</span><span class="r-val" style="font-size:12px">${periodo}</span></div>
      <div class="report-row"><span class="r-key">Total de entregas</span><span class="r-val">${lista.length}</span></div>
      <div class="report-row"><span class="r-key">Status do pagamento</span><span class="r-val" style="color:${pagamentoConfirmado?'var(--green)':'var(--red)'}">${pagamentoConfirmado?'Pagamento confirmado':'Pendente de pagamento'}</span></div>
      <div class="report-row"><span class="r-key">Total a pagar — GG Express</span><span class="r-val" style="color:var(--red)">R$${totalGG.toFixed(2).replace('.',',')}</span></div>
    </div>
    ${lista.length?`<div style="background:var(--red-dim);border:1px solid rgba(255,77,109,.3);border-radius:9px;padding:11px 14px;margin-top:10px">
      <div style="font-size:11px;color:var(--red);font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px">Cobrança automática GG Express</div>
      <div style="font-size:24px;font-weight:800;color:var(--red)">R$${totalGG.toFixed(2).replace('.',',')}</div>
      <div style="font-size:12px;color:var(--text2);margin-top:2px">${lista.length} entregas</div>
      <div class="pix-box">
        <div style="font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:.5px">PIX chave e-mail</div>
        <div class="pix-key">${PIX_GG}</div>
        <button class="btn btn-green btn-sm" onclick="copiarPix()">Copiar chave PIX</button>
      </div>
    </div>`:''}`;

  const motos={};
  lista.forEach(p=>{if(p.motoId){if(!motos[p.motoId])motos[p.motoId]={nome:p.motoNome||'?',qtd:0};motos[p.motoId].qtd++;}});
  const lm=Object.values(motos);
  document.getElementById('rel-por-moto').innerHTML=lm.length
    ?`<div class="report-box">${lm.map(m=>`<div class="report-row"><span class="r-key">${m.nome}</span><span class="r-val">${m.qtd} entrega${m.qtd>1?'s':''}</span></div>`).join('')}</div>`
    :'<div class="empty"><div class="empty-ico">🛵</div><div>Sem dados</div></div>';
  const tb=document.getElementById('rel-detalhe-body');
  if(!lista.length){tb.innerHTML='<tr><td colspan="4" style="text-align:center;color:var(--text3);padding:26px">Nenhuma entrega no período</td></tr>';return;}
  tb.innerHTML=lista.map(p=>{
    const dt=new Date(p.criadoEm);
    const dtFmt=dt.toLocaleDateString('pt-BR')+' '+dt.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
    return `<tr><td>${dtFmt}</td><td class="name">${p.cliente}</td><td>${p.endereco}</td><td>${p.motoNome||'—'}</td></tr>`;
  }).join('');
};

window.criarPedido=function(){
  const cliente=document.getElementById('inp-cliente').value.trim();
  const end=document.getElementById('inp-end').value.trim();
  const itens=document.getElementById('inp-itens').value.trim();
  const observacao=document.getElementById('inp-obs').value.trim();
  if(!cliente||!end||!itens){toast('Preencha todos os campos','err');return;}
  push(ref(db,'pedidos'),{
    cliente,endereco:end,itens,observacao,
    restId:restAtual.id,restNome:restAtual.nome,restEndereco:restAtual.endereco,
    taxaEntrega:REPASSE_EMPRESA,
    taxaMotoboy:REPASSE_MOTOBOY,
    ggValor:LUCRO_GG,
    repasseEmpresa:REPASSE_EMPRESA,
    restPago:false,
    motoPago:false,
    status:'aguardando',criadoEm:Date.now(),motoId:null,motoNome:null
  });
  ['inp-cliente','inp-end','inp-itens','inp-obs'].forEach(id=>document.getElementById(id).value='');
  toast('Pedido criado!');
};

window.chamarMotoboys=function(pid){update(ref(db,'pedidos/'+pid),{status:'chamando'});toast('Motoboys notificados!');};
window.copiarPix=function(){
  navigator.clipboard.writeText(PIX_GG).then(()=>toast('Chave PIX copiada!')).catch(()=>toast('Não foi possível copiar','err'));
};

window.showTab=function(t,el){
  document.querySelectorAll('.screen').forEach(x=>x.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
  document.getElementById('tab-'+t).classList.add('active');el.classList.add('active');
};
function showErr(msg){const el=document.getElementById('login-err');el.textContent=msg;el.style.display='block';setTimeout(()=>el.style.display='none',3000);}
function toast(msg,type='ok'){const el=document.getElementById('toast');el.textContent=msg;el.className=type==='err'?'err show':'show';setTimeout(()=>el.className='',3000);}
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MotoDesk — Painel Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f0f; --surface: #1a1a1a; --surface2: #222;
    --border: #2e2e2e; --accent: #ff6b2b; --text: #f0ede8;
    --muted: #777; --green: #3ecf8e; --blue: #4da6ff;
    --red: #ff4d4d; --yellow: #ffd166;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; }

  header {
    background: var(--surface); border-bottom: 1px solid var(--border);
    padding: 0 32px; height: 64px;
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 100;
  }
  .logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 22px; }
  .logo span { color: var(--accent); }
  .header-links { display: flex; gap: 8px; }
  .link-btn { padding: 8px 16px; border-radius: 8px; font-size: 13px; font-weight: 500; cursor: pointer; text-decoration: none; border: 1px solid var(--border); background: var(--surface2); color: var(--text); transition: all .2s; font-family: 'DM Sans', sans-serif; }
  .link-btn:hover { border-color: var(--accent); color: var(--accent); }

  .container { max-width: 1200px; margin: 0 auto; padding: 32px; }

  .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 16px; margin-bottom: 32px; }
  .stat { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 20px; }
  .stat-num { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 36px; }
  .stat-label { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; margin-top: 4px; }
  .stat-accent { color: var(--accent); }
  .stat-green { color: var(--green); }
  .stat-blue { color: var(--blue); }
  .stat-yellow { color: var(--yellow); }

  .grid-2 { display: grid; grid-template-columns: 340px 1fr; gap: 24px; align-items: start; }
  @media(max-width:900px) { .grid-2 { grid-template-columns: 1fr; } }

  .section-title { font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin-bottom: 16px; }

  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 24px; margin-bottom: 20px; }

  /* MOTOBOYS */
  .moto-row {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 0; border-bottom: 1px solid var(--border);
  }
  .moto-row:last-child { border-bottom: none; }
  .avatar { width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-family: 'Syne', sans-serif; font-weight: 700; font-size: 14px; flex-shrink: 0; }
  .av-green { background: rgba(62,207,142,.15); color: var(--green); border: 1.5px solid rgba(62,207,142,.4); }
  .av-yellow { background: rgba(255,209,102,.15); color: var(--yellow); border: 1.5px solid rgba(255,209,102,.4); }
  .av-gray { background: var(--surface2); color: var(--muted); border: 1.5px solid var(--border); }
  .moto-info { flex: 1; }
  .moto-nome { font-size: 14px; font-weight: 500; }
  .moto-tel { font-size: 12px; color: var(--muted); margin-top: 1px; }
  .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .dot-green { background: var(--green); box-shadow: 0 0 6px var(--green); }
  .dot-yellow { background: var(--yellow); }
  .dot-gray { background: var(--muted); }

  /* PEDIDOS TABLE */
  .pedido-row { padding: 14px 0; border-bottom: 1px solid var(--border); display: flex; gap: 16px; align-items: flex-start; }
  .pedido-row:last-child { border-bottom: none; }
  .pedido-col-1 { flex: 1.5; }
  .pedido-col-2 { flex: 2; }
  .pedido-col-3 { flex: 1; text-align: right; }
  .p-cliente { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 14px; }
  .p-end { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .p-itens { font-size: 13px; color: var(--muted); }
  .p-moto { font-size: 12px; color: var(--green); margin-top: 4px; }
  .p-valor { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 15px; color: var(--accent); }
  .p-time { font-size: 11px; color: var(--muted); margin-top: 2px; }

  .badge { display: inline-flex; align-items: center; gap: 4px; padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 500; white-space: nowrap; }
  .b-aguardando { background: rgba(255,209,102,.15); color: var(--yellow); border: 1px solid rgba(255,209,102,.3); }
  .b-chamando { background: rgba(77,166,255,.15); color: var(--blue); border: 1px solid rgba(77,166,255,.3); }
  .b-em-rota { background: rgba(255,107,43,.15); color: var(--accent); border: 1px solid rgba(255,107,43,.3); }
  .b-entregue { background: rgba(62,207,142,.15); color: var(--green); border: 1px solid rgba(62,207,142,.3); }
  .b-cancelado { background: rgba(255,77,77,.15); color: var(--red); border: 1px solid rgba(255,77,77,.3); }

  .empty { text-align: center; padding: 32px; color: var(--muted); font-size: 14px; }
  .spinner { border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; width: 20px; height: 20px; animation: spin .6s linear infinite; margin: 20px auto; }
  @keyframes spin { to{transform:rotate(360deg)} }

  .filter-row { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
  .filter-btn { padding: 7px 14px; border-radius: 8px; font-size: 12px; cursor: pointer; border: 1px solid var(--border); background: var(--surface2); color: var(--muted); font-family: 'DM Sans', sans-serif; transition: all .2s; }
  .filter-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(255,107,43,.1); }

  .live-badge { display: inline-flex; align-items: center; gap: 6px; background: rgba(62,207,142,.1); border: 1px solid rgba(62,207,142,.3); color: var(--green); padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: 500; }
  .live-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); animation: blink 1s infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }

  @media(max-width:600px) { .container { padding: 16px; } header { padding: 0 16px; } .stats { grid-template-columns: repeat(2,1fr); } }
</style>
</head>
<body>

<header>
  <div class="logo">Moto<span>Desk</span> <span style="font-size:13px;font-weight:400;color:var(--muted);font-family:'DM Sans',sans-serif">Admin</span></div>
  <div class="header-links">
    <div class="live-badge"><div class="live-dot"></div>Ao vivo</div>
    <a href="restaurante.html" class="link-btn">🏪 Restaurante</a>
    <a href="motoboy.html" class="link-btn">🛵 Motoboy</a>
  </div>
</header>

<div class="container">

  <div class="stats">
    <div class="stat"><div class="stat-num stat-accent" id="s-total">—</div><div class="stat-label">Pedidos hoje</div></div>
    <div class="stat"><div class="stat-num stat-yellow" id="s-abertos">—</div><div class="stat-label">Em aberto</div></div>
    <div class="stat"><div class="stat-num stat-blue" id="s-rota">—</div><div class="stat-label">Em rota</div></div>
    <div class="stat"><div class="stat-num stat-green" id="s-entregues">—</div><div class="stat-label">Entregues</div></div>
    <div class="stat"><div class="stat-num stat-green" id="s-motoboys">—</div><div class="stat-label">Motoboys online</div></div>
    <div class="stat"><div class="stat-num stat-accent" id="s-faturamento">—</div><div class="stat-label">Faturamento</div></div>
  </div>

  <div class="grid-2">
    <!-- MOTOBOYS -->
    <div>
      <div class="card">
        <div class="section-title">Motoboys</div>
        <div id="lista-motoboys"><div class="spinner"></div></div>
      </div>
    </div>

    <!-- PEDIDOS -->
    <div>
      <div class="section-title">Pedidos</div>
      <div class="filter-row">
        <div class="filter-btn active" onclick="setFiltro('todos', this)">Todos</div>
        <div class="filter-btn" onclick="setFiltro('aguardando', this)">Aguardando</div>
        <div class="filter-btn" onclick="setFiltro('chamando', this)">Chamando</div>
        <div class="filter-btn" onclick="setFiltro('em-rota', this)">Em rota</div>
        <div class="filter-btn" onclick="setFiltro('entregue', this)">Entregues</div>
      </div>
      <div class="card" style="padding:8px 20px">
        <div id="lista-pedidos"><div class="spinner"></div></div>
      </div>
    </div>
  </div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
import firebaseConfig from "./firebase-config.js";

const app = initializeApp(firebaseConfig);
const db  = getDatabase(app);

let todosPedidos = [];
let filtroAtual = 'todos';

window.setFiltro = function(f, el) {
  filtroAtual = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  renderPedidos();
};

// ── PEDIDOS ───────────────────────────────────────────────
onValue(ref(db, 'pedidos'), snap => {
  const data = snap.val() || {};
  todosPedidos = Object.entries(data)
    .map(([id, v]) => ({ id, ...v }))
    .sort((a, b) => (b.criadoEm || 0) - (a.criadoEm || 0));

  const entregues = todosPedidos.filter(p => p.status === 'entregue');
  const abertos   = todosPedidos.filter(p => !['entregue','cancelado'].includes(p.status));
  const emRota    = todosPedidos.filter(p => p.status === 'em-rota');

  let fat = 0;
  entregues.forEach(p => {
    const v = parseFloat((p.valor || '0').replace(',', '.'));
    if (!isNaN(v)) fat += v;
  });

  document.getElementById('s-total').textContent     = todosPedidos.length;
  document.getElementById('s-abertos').textContent   = abertos.length;
  document.getElementById('s-rota').textContent      = emRota.length;
  document.getElementById('s-entregues').textContent = entregues.length;
  document.getElementById('s-faturamento').textContent = fat > 0 ? 'R$' + fat.toFixed(0) : '—';

  renderPedidos();
});

function renderPedidos() {
  const lista = filtroAtual === 'todos' ? todosPedidos : todosPedidos.filter(p => p.status === filtroAtual);
  const el = document.getElementById('lista-pedidos');
  if (!lista.length) { el.innerHTML = `<div class="empty">Nenhum pedido</div>`; return; }

  const badgeMap = {
    aguardando: 'b-aguardando', chamando: 'b-chamando',
    'em-rota': 'b-em-rota', entregue: 'b-entregue', cancelado: 'b-cancelado'
  };
  const labelMap = {
    aguardando: 'Aguardando', chamando: 'Chamando', 'em-rota': 'Em rota', entregue: 'Entregue', cancelado: 'Cancelado'
  };

  el.innerHTML = lista.map(p => `
    <div class="pedido-row">
      <div class="pedido-col-1">
        <div class="p-cliente">${p.cliente}</div>
        <div class="p-end">📍 ${p.endereco}</div>
        ${p.motoNome ? `<div class="p-moto">🛵 ${p.motoNome}</div>` : ''}
      </div>
      <div class="pedido-col-2">
        <div class="p-itens">${p.itens}</div>
      </div>
      <div class="pedido-col-3">
        <span class="badge ${badgeMap[p.status] || ''}">${labelMap[p.status] || p.status}</span>
        ${p.valor && p.valor !== '—' ? `<div class="p-valor" style="margin-top:6px">R$ ${p.valor}</div>` : ''}
      </div>
    </div>
  `).join('');
}

// ── MOTOBOYS ──────────────────────────────────────────────
onValue(ref(db, 'motoboys'), snap => {
  const data = snap.val() || {};
  const lista = Object.entries(data).map(([id, v]) => ({ id, ...v }));
  const online = lista.filter(m => m.online);

  document.getElementById('s-motoboys').textContent = online.length;

  const el = document.getElementById('lista-motoboys');
  if (!lista.length) { el.innerHTML = `<div class="empty">Nenhum motoboy cadastrado</div>`; return; }

  el.innerHTML = lista
    .sort((a, b) => (b.online ? 1 : 0) - (a.online ? 1 : 0))
    .map(m => {
      const ini = m.nome.split(' ').map(x => x[0]).join('').slice(0, 2).toUpperCase();
      const avCls = !m.online ? 'av-gray' : m.status === 'ocupado' ? 'av-yellow' : 'av-green';
      const dotCls = !m.online ? 'dot-gray' : m.status === 'ocupado' ? 'dot-yellow' : 'dot-green';
      const statusTxt = !m.online ? 'Offline' : m.status === 'ocupado' ? 'Em entrega' : 'Disponível';
      return `
      <div class="moto-row">
        <div class="avatar ${avCls}">${ini}</div>
        <div class="moto-info">
          <div class="moto-nome">${m.nome}</div>
          <div class="moto-tel">${m.tel || ''}</div>
        </div>
        <div class="dot ${dotCls}"></div>
        <div style="font-size:11px;color:var(--muted);min-width:60px;text-align:right">${statusTxt}</div>
      </div>`;
    }).join('');
});
</script>
</body>
</html>

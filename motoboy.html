<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>FolhaDelivery — Motoboy</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#060608;--s1:#0e0e12;--s2:#16161c;--s3:#1e1e26;
  --border:rgba(255,255,255,.07);--border2:rgba(255,255,255,.12);
  --accent:#00d4a0;--accent2:#00b386;--accent-dim:rgba(0,212,160,.12);
  --orange:#ff6b35;--orange-dim:rgba(255,107,53,.12);
  --blue:#4d9fff;--red:#ff4d6d;--red-dim:rgba(255,77,109,.12);
  --yellow:#ffd166;--yellow-dim:rgba(255,209,102,.12);
  --text:#f0ede8;--text2:#9994a8;--text3:#5a5568;
  --font:'Plus Jakarta Sans',sans-serif;--r:12px;--r2:16px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;max-width:480px;margin:0 auto}

header{background:var(--s1);border-bottom:1px solid var(--border);padding:0 20px;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.logo{font-size:17px;font-weight:800;letter-spacing:-.3px}
.logo span{color:var(--accent)}

/* LOGIN */
#screen-login{padding:24px 20px;display:flex;flex-direction:column;justify-content:center;min-height:calc(100vh - 60px)}
.login-hero{text-align:center;margin-bottom:32px}
.hero-ico{font-size:60px;margin-bottom:14px;display:block;animation:float 3s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.hero-title{font-size:26px;font-weight:800;letter-spacing:-.5px;margin-bottom:6px}
.hero-sub{font-size:14px;color:var(--text2)}

.card{background:var(--s1);border:1px solid var(--border);border-radius:var(--r2);padding:20px}
.field{margin-bottom:14px}
.field label{display:block;font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:.6px;margin-bottom:6px}
.field input{width:100%;background:var(--s2);border:1px solid var(--border);border-radius:9px;padding:12px 14px;color:var(--text);font-family:var(--font);font-size:14px;outline:none;transition:border-color .2s}
.field input:focus{border-color:var(--accent)}

.btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:14px;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;border:none;font-family:var(--font);transition:all .2s}
.btn-accent{background:var(--accent);color:#060a0a}
.btn-accent:hover{background:var(--accent2)}
.btn-orange{background:var(--orange);color:#fff}
.btn-orange:hover{background:#e55a1e}
.btn-ghost{background:var(--s2);color:var(--text2);border:1px solid var(--border);width:auto;padding:8px 14px;font-size:12px;border-radius:8px}
.btn-ghost:hover{color:var(--text)}
.btn-outline-red{background:transparent;color:var(--red);border:1px solid rgba(255,77,109,.3);font-size:12px;padding:7px 14px;border-radius:8px;width:auto}

.err-msg{color:var(--red);font-size:13px;text-align:center;margin-bottom:12px;display:none;padding:10px;background:var(--red-dim);border-radius:8px}

/* DASHBOARD */
#screen-dash{display:none;flex-direction:column;gap:14px;padding:20px}

.profile-card{background:var(--s1);border:1px solid var(--border);border-radius:var(--r2);padding:16px;display:flex;align-items:center;gap:14px}
.avatar{width:46px;height:46px;border-radius:50%;background:var(--accent-dim);border:2px solid var(--accent);color:var(--accent);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:16px;flex-shrink:0}
.profile-info{flex:1}
.profile-name{font-size:15px;font-weight:700}
.profile-tel{font-size:12px;color:var(--text2);margin-top:2px}
.profile-status{font-size:12px;margin-top:4px}

.status-btns{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.status-btn{padding:10px;border-radius:9px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:var(--s2);color:var(--text2);font-family:var(--font);transition:all .2s;text-align:center}
.status-btn.on-green{background:var(--accent-dim);border-color:rgba(0,212,160,.4);color:var(--accent)}
.status-btn.on-yellow{background:var(--yellow-dim);border-color:rgba(255,209,102,.4);color:var(--yellow)}

/* CORRIDA BANNER */
.corrida-banner{background:var(--s2);border:1.5px solid var(--accent);border-radius:var(--r2);padding:20px;position:relative;overflow:hidden}
.corrida-banner::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--accent),transparent);animation:sweep 2s infinite}
@keyframes sweep{0%{opacity:0;transform:translateX(-100%)}50%{opacity:1}100%{opacity:0;transform:translateX(100%)}}
.corrida-tag{display:inline-block;background:var(--accent);color:#060a0a;font-size:10px;font-weight:800;padding:3px 10px;border-radius:20px;letter-spacing:1px;text-transform:uppercase;margin-bottom:14px}
.corrida-cliente{font-size:20px;font-weight:800;letter-spacing:-.3px;margin-bottom:6px}
.info-row{display:flex;align-items:flex-start;gap:8px;margin-bottom:6px}
.info-ico{font-size:14px;flex-shrink:0;margin-top:1px}
.info-txt{font-size:13px;color:var(--text2);line-height:1.4}
.info-txt strong{color:var(--text)}
.taxa-box{background:var(--accent-dim);border:1px solid rgba(0,212,160,.3);border-radius:10px;padding:12px 16px;margin:14px 0;display:flex;align-items:center;justify-content:space-between}
.taxa-label{font-size:12px;color:var(--text2)}
.taxa-val{font-size:22px;font-weight:800;color:var(--accent)}
.corrida-actions{display:grid;grid-template-columns:1fr auto;gap:8px}
.btn-recusar{background:transparent;border:1px solid var(--border);color:var(--text2);border-radius:9px;padding:0 16px;font-size:13px;cursor:pointer;font-family:var(--font);transition:all .2s;white-space:nowrap}
.btn-recusar:hover{border-color:var(--red);color:var(--red)}

/* EM ROTA */
.rota-card{background:var(--s2);border:1.5px solid var(--orange);border-radius:var(--r2);padding:18px}
.rota-tag{display:inline-block;background:var(--orange);color:#fff;font-size:10px;font-weight:800;padding:3px 10px;border-radius:20px;letter-spacing:1px;margin-bottom:12px}
.maps-link{display:flex;align-items:center;justify-content:center;gap:6px;text-decoration:none;background:var(--blue-dim);border:1px solid rgba(77,159,255,.3);color:var(--blue);border-radius:9px;padding:10px;font-size:13px;font-weight:600;margin:12px 0;font-family:var(--font)}

/* HISTÓRICO */
.hist-item{padding:12px 0;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.hist-item:last-child{border-bottom:none}
.hist-info .hist-cliente{font-size:13px;font-weight:600}
.hist-info .hist-hora{font-size:11px;color:var(--text2);margin-top:2px}
.hist-taxa{font-size:15px;font-weight:800;color:var(--accent)}

/* RELATÓRIO */
.rel-box{background:var(--s2);border:1px solid var(--border);border-radius:var(--r);padding:16px}
.rel-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border)}
.rel-row:last-child{border-bottom:none}
.rel-k{font-size:13px;color:var(--text2)}
.rel-v{font-size:14px;font-weight:700;color:var(--text)}

.section-title{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--text3);margin-bottom:10px}
.idle-state{text-align:center;padding:28px;color:var(--text3)}
.idle-ico{font-size:40px;opacity:.25;margin-bottom:10px}

.tabs-bottom{display:flex;background:var(--s1);border-top:1px solid var(--border);position:sticky;bottom:0}
.tab-btn{flex:1;padding:12px 8px;font-size:11px;font-weight:600;color:var(--text2);cursor:pointer;border:none;background:transparent;font-family:var(--font);border-top:2px solid transparent;transition:all .2s}
.tab-btn.active{color:var(--accent);border-top-color:var(--accent)}

.screen-inner{display:none;padding:16px 20px;flex-direction:column;gap:12px}
.screen-inner.active{display:flex}
</style>
</head>
<body>

<header>
  <div class="logo">Folha<span>Delivery</span></div>
  <div id="header-right" style="font-size:12px;color:var(--text2)">App do motoboy</div>
</header>

<!-- LOGIN -->
<div id="screen-login">
  <div class="login-hero">
    <span class="hero-ico">🛵</span>
    <div class="hero-title">Olá, motoboy!</div>
    <div class="hero-sub">Entre para receber corridas em tempo real</div>
  </div>
  <div class="card">
    <div id="login-err" class="err-msg">Número já está online em outro dispositivo</div>
    <div class="field"><label>Seu nome completo</label><input type="text" id="inp-nome" placeholder="Ex: Carlos Oliveira"></div>
    <div class="field"><label>Telefone / WhatsApp</label><input type="tel" id="inp-tel" placeholder="(xx) xxxxx-xxxx" onkeydown="if(event.key==='Enter')entrar()"></div>
    <button class="btn btn-accent" onclick="entrar()">Entrar e ficar disponível</button>
  </div>
</div>

<!-- DASHBOARD -->
<div id="screen-dash">
  <div style="display:flex;flex-direction:column;gap:12px;flex:1">

    <!-- CORRIDAS / ROTA / IDLE -->
    <div class="screen-inner active" id="inner-corridas">
      <div class="profile-card">
        <div class="avatar" id="dash-avatar">?</div>
        <div class="profile-info">
          <div class="profile-name" id="dash-nome">—</div>
          <div class="profile-tel" id="dash-tel">—</div>
          <div class="profile-status" id="dash-status-txt"></div>
        </div>
        <button class="btn-ghost" onclick="sair()">Sair</button>
      </div>
      <div class="status-btns">
        <div class="status-btn" id="btn-disp" onclick="setStatus('disponivel')">● Disponível</div>
        <div class="status-btn" id="btn-pausa" onclick="setStatus('pausa')">⏸ Pausa</div>
      </div>
      <div id="sec-corrida"></div>
      <div id="sec-rota"></div>
      <div id="sec-idle"></div>
    </div>

    <!-- HISTÓRICO -->
    <div class="screen-inner" id="inner-historico">
      <div class="section-title" id="hist-title">Minhas entregas hoje</div>
      <div id="lista-historico"></div>
    </div>

    <!-- RELATÓRIO -->
    <div class="screen-inner" id="inner-relatorio">
      <div class="section-title">Relatório do dia</div>
      <div id="moto-relatorio"></div>
    </div>

  </div>

  <div class="tabs-bottom">
    <button class="tab-btn active" onclick="showInner('corridas',this)">Corridas</button>
    <button class="tab-btn" onclick="showInner('historico',this)">Histórico</button>
    <button class="tab-btn" onclick="showInner('relatorio',this)">Relatório</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, update, onValue, remove, serverTimestamp }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
import firebaseConfig from "./firebase-config.js";

const app = initializeApp(firebaseConfig);
const db  = getDatabase(app);

let motoAtual = JSON.parse(localStorage.getItem('motoAtual')||'null');
let statusAtual = 'disponivel';
let corridasVistas = new Set();

// ── ENTRAR ────────────────────────────────────────────────
window.entrar = async function() {
  const nome = document.getElementById('inp-nome').value.trim();
  const tel  = document.getElementById('inp-tel').value.trim();
  if (!nome||!tel) { showErr('Preencha nome e telefone'); return; }

  // Verifica se número já está online
  const telKey = tel.replace(/\D/g,'');
  let duplicado = false;
  await new Promise(res => {
    onValue(ref(db,'motoboys'), snap => {
      const d = snap.val()||{};
      Object.values(d).forEach(m => {
        const mTel = (m.tel||'').replace(/\D/g,'');
        if (mTel === telKey && m.online) duplicado = true;
      });
      res();
    }, {onlyOnce:true});
  });

  if (duplicado) { showErr('Número já está online em outro dispositivo'); return; }

  const id = 'moto_' + telKey + '_' + Date.now();
  motoAtual = {id, nome, tel};
  localStorage.setItem('motoAtual', JSON.stringify(motoAtual));
  await set(ref(db,'motoboys/'+id), {nome, tel, online:true, status:'disponivel', entradaEm: Date.now()});
  iniciarDash();
};

// ── SAIR ──────────────────────────────────────────────────
window.sair = async function() {
  if (motoAtual) {
    await update(ref(db,'motoboys/'+motoAtual.id),{online:false});
    localStorage.removeItem('motoAtual');
    motoAtual = null;
  }
  document.getElementById('screen-login').style.display='flex';
  document.getElementById('screen-dash').style.display='none';
};

// ── STATUS ────────────────────────────────────────────────
window.setStatus = function(s) {
  statusAtual = s;
  update(ref(db,'motoboys/'+motoAtual.id),{status:s});
  renderToggle(s);
  renderSecoes([]);
};

function renderToggle(s) {
  document.getElementById('btn-disp').className = 'status-btn'+(s==='disponivel'?' on-green':'');
  document.getElementById('btn-pausa').className = 'status-btn'+(s==='pausa'?' on-yellow':'');
  const ini = motoAtual.nome.split(' ').map(x=>x[0]).join('').slice(0,2).toUpperCase();
  document.getElementById('dash-avatar').textContent = ini;
  document.getElementById('dash-nome').textContent = motoAtual.nome;
  document.getElementById('dash-tel').textContent = motoAtual.tel;
  const txt = s==='disponivel'?'🟢 Disponível':s==='pausa'?'⏸ Em pausa':'🟡 Em entrega';
  document.getElementById('dash-status-txt').textContent = txt;
  document.getElementById('header-right').textContent = s==='disponivel'?'🟢 Online':'⏸ Pausa';
}

// ── INICIAR DASH ──────────────────────────────────────────
function iniciarDash() {
  document.getElementById('screen-login').style.display='none';
  document.getElementById('screen-dash').style.display='flex';
  document.getElementById('screen-dash').style.flexDirection='column';
  document.getElementById('screen-dash').style.minHeight='calc(100vh - 60px)';
  renderToggle('disponivel');

  onValue(ref(db,'pedidos'), snap => {
    const d = snap.val()||{};
    const todos = Object.entries(d).map(([id,v])=>({id,...v}));

    const disponiveis = todos.filter(p=>p.status==='chamando'&&!p.motoId);
    const minhaRota   = todos.find(p=>p.status==='em-rota'&&p.motoId===motoAtual.id);
    const hoje = new Date(); hoje.setHours(0,0,0,0);
    const meuHist = todos.filter(p=>p.status==='entregue'&&p.motoId===motoAtual.id&&p.criadoEm>=hoje.getTime());

    if (statusAtual==='disponivel') {
      disponiveis.forEach(p=>{
        if(!corridasVistas.has(p.id)){corridasVistas.add(p.id);notificar();}
      });
    }
    renderSecoes(disponiveis, minhaRota);
    renderHistorico(meuHist);
    renderRelatorio(meuHist);
  });
}

function renderSecoes(disponiveis, minhaRota) {
  const corridaEl = document.getElementById('sec-corrida');
  const rotaEl    = document.getElementById('sec-rota');
  const idleEl    = document.getElementById('sec-idle');

  if (minhaRota) {
    corridaEl.innerHTML='';
    idleEl.innerHTML='';
    const mapsUrl = `https://www.google.com/maps/dir/?api=1&destination=${encodeURIComponent(minhaRota.endereco)}`;
    rotaEl.innerHTML=`
      <div class="rota-card">
        <div class="rota-tag">Em rota</div>
        <div class="corrida-cliente">${minhaRota.cliente}</div>
        <div class="info-row"><span class="info-ico">📍</span><span class="info-txt">${minhaRota.endereco}</span></div>
        <div class="info-row"><span class="info-ico">📦</span><span class="info-txt">${minhaRota.itens}</span></div>
        <a href="${mapsUrl}" target="_blank" class="maps-link">🗺 Abrir no Google Maps</a>
        <button class="btn btn-orange" onclick="marcarEntregue('${minhaRota.id}')">✓ Confirmar entrega</button>
      </div>`;
    return;
  }
  rotaEl.innerHTML='';

  if (statusAtual==='pausa') {
    corridaEl.innerHTML='';
    idleEl.innerHTML=`<div class="idle-state"><div class="idle-ico">⏸</div><div style="font-size:14px">Você está em pausa</div></div>`;
    return;
  }

  if (!disponiveis.length) {
    corridaEl.innerHTML='';
    idleEl.innerHTML=`<div class="idle-state"><div class="idle-ico">🛵</div><div style="font-size:14px">Aguardando corridas...</div></div>`;
    return;
  }
  idleEl.innerHTML='';

  corridaEl.innerHTML = disponiveis.map(p=>{
    const taxaMoto = Number(p.taxaMotoboy||6.5).toFixed(2).replace('.',',');
    return `
    <div class="corrida-banner">
      <div class="corrida-tag">Nova corrida!</div>
      <div class="corrida-cliente">${p.cliente}</div>
      <div class="info-row"><span class="info-ico">🏪</span><span class="info-txt"><strong>${p.restNome||'Restaurante'}</strong><br>${p.restEndereco||''}</span></div>
      <div class="info-row"><span class="info-ico">📍</span><span class="info-txt">${p.endereco}</span></div>
      <div class="info-row"><span class="info-ico">📦</span><span class="info-txt">${p.itens}</span></div>
      <div class="taxa-box">
        <div><div class="taxa-label">Você recebe</div></div>
        <div class="taxa-val">R$ ${taxaMoto}</div>
      </div>
      <div class="corrida-actions">
        <button class="btn btn-accent" onclick="aceitarCorrida('${p.id}')">✓ Aceitar corrida</button>
        <button class="btn-recusar" onclick="recusar('${p.id}')">Recusar</button>
      </div>
    </div>`;
  }).join('');
}

window.aceitarCorrida = async function(pid) {
  await update(ref(db,'pedidos/'+pid),{status:'em-rota',motoId:motoAtual.id,motoNome:motoAtual.nome});
  await update(ref(db,'motoboys/'+motoAtual.id),{status:'ocupado'});
  statusAtual='ocupado'; renderToggle('ocupado');
};

window.marcarEntregue = async function(pid) {
  await update(ref(db,'pedidos/'+pid),{status:'entregue',entregueEm:Date.now()});
  await update(ref(db,'motoboys/'+motoAtual.id),{status:'disponivel'});
  statusAtual='disponivel'; renderToggle('disponivel');
};

window.recusar = function(pid) { corridasVistas.add(pid); };

function renderHistorico(hist) {
  document.getElementById('hist-title').textContent = `Minhas entregas hoje (${hist.length})`;
  const el = document.getElementById('lista-historico');
  if (!hist.length) { el.innerHTML='<div class="idle-state"><div class="idle-ico">📋</div><div style="font-size:14px">Nenhuma entrega hoje</div></div>'; return; }
  el.innerHTML = hist.reverse().map(p=>{
    const hora = new Date(p.criadoEm).toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
    const taxa = Number(p.taxaMotoboy||6.5).toFixed(2).replace('.',',');
    return `<div class="hist-item">
      <div class="hist-info">
        <div class="hist-cliente">${p.cliente}</div>
        <div class="hist-hora">${p.restNome||''} · ${hora}</div>
      </div>
      <div class="hist-taxa">R$ ${taxa}</div>
    </div>`;
  }).join('');
}

function renderRelatorio(hist) {
  const total = hist.reduce((s,p)=>s+Number(p.taxaMotoboy||6.5),0);
  document.getElementById('moto-relatorio').innerHTML = `
    <div class="rel-box">
      <div class="rel-row"><span class="rel-k">Entregas hoje</span><span class="rel-v">${hist.length}</span></div>
      <div class="rel-row"><span class="rel-k">Ganhos hoje</span><span class="rel-v" style="color:var(--accent)">R$ ${total.toFixed(2).replace('.',',')}</span></div>
      <div class="rel-row"><span class="rel-k">Taxa por entrega</span><span class="rel-v">R$ 6,50</span></div>
    </div>
    ${hist.length?`<div class="section-title" style="margin-top:14px">Detalhe por entrega</div>
    <div class="rel-box">${hist.map(p=>{
      const hora=new Date(p.criadoEm).toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
      return `<div class="rel-row"><span class="rel-k">${hora} — ${p.cliente}</span><span class="rel-v" style="color:var(--accent)">R$ ${Number(p.taxaMotoboy||6.5).toFixed(2).replace('.',',')}</span></div>`;
    }).join('')}</div>`:''}`;
}

window.showInner = function(s, el) {
  document.querySelectorAll('.screen-inner').forEach(x=>x.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(x=>x.classList.remove('active'));
  document.getElementById('inner-'+s).classList.add('active');
  el.classList.add('active');
};

function notificar() {
  if(navigator.vibrate) navigator.vibrate([300,100,300,100,300]);
  try {
    const ctx=new AudioContext(), osc=ctx.createOscillator(), g=ctx.createGain();
    osc.connect(g); g.connect(ctx.destination);
    osc.frequency.setValueAtTime(880,ctx.currentTime);
    osc.frequency.setValueAtTime(1100,ctx.currentTime+.15);
    osc.frequency.setValueAtTime(880,ctx.currentTime+.3);
    g.gain.setValueAtTime(.4,ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+.6);
    osc.start(); osc.stop(ctx.currentTime+.6);
  } catch(e){}
}

function showErr(msg) {
  const el=document.getElementById('login-err');
  el.textContent=msg; el.style.display='block';
  setTimeout(()=>el.style.display='none',4000);
}

// Auto-login
if (motoAtual) {
  update(ref(db,'motoboys/'+motoAtual.id),{online:true,status:'disponivel'});
  iniciarDash();
} else {
  document.getElementById('screen-login').style.display='flex';
}

<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>GG Express — Motoboy</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#060608;--s1:#0e0e12;--s2:#16161c;
  --border:rgba(255,255,255,.07);--border2:rgba(255,255,255,.12);
  --accent:#00d4a0;--accent2:#00b386;--accent-dim:rgba(0,212,160,.12);
  --orange:#ff6b35;--orange-dim:rgba(255,107,53,.12);
  --blue:#4d9fff;--blue-dim:rgba(77,159,255,.12);
  --yellow:#ffd166;--yellow-dim:rgba(255,209,102,.12);
  --red:#ff4d6d;--red-dim:rgba(255,77,109,.12);
  --purple:#b57bee;
  --text:#f0ede8;--text2:#9994a8;--text3:#5a5568;
  --font:'Plus Jakarta Sans',sans-serif;--r:12px;--r2:16px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;max-width:480px;margin:0 auto}

header{background:var(--s1);border-bottom:1px solid var(--border);padding:0 20px;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.logo{font-size:17px;font-weight:800;letter-spacing:-.3px}.logo span{color:var(--accent)}

/* LOGIN */
#screen-login{padding:24px 20px;display:flex;flex-direction:column;justify-content:center;min-height:calc(100vh - 60px)}
.login-hero{text-align:center;margin-bottom:32px}
.hero-ico{font-size:56px;margin-bottom:14px;display:block;animation:float 3s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.hero-title{font-size:24px;font-weight:800;letter-spacing:-.5px;margin-bottom:6px}
.hero-sub{font-size:13px;color:var(--text2)}
.card{background:var(--s1);border:1px solid var(--border);border-radius:var(--r2);padding:20px}
.field{margin-bottom:14px}
.field label{display:block;font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:.6px;margin-bottom:6px}
.field input{width:100%;background:var(--s2);border:1px solid var(--border);border-radius:9px;padding:12px 14px;color:var(--text);font-family:var(--font);font-size:14px;outline:none;transition:border-color .2s}
.field input:focus{border-color:var(--accent)}
.btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:14px;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;border:none;font-family:var(--font);transition:all .2s}
.btn-accent{background:var(--accent);color:#060a0a}.btn-accent:hover{background:var(--accent2)}
.btn-orange{background:var(--orange);color:#fff}.btn-orange:hover{background:#e55a1e}
.btn-purple{background:var(--purple);color:#fff}
.btn-ghost{background:var(--s2);color:var(--text2);border:1px solid var(--border);width:auto;padding:8px 14px;font-size:12px;border-radius:8px}
.err-msg{color:var(--red);font-size:13px;text-align:center;margin-bottom:12px;display:none;padding:10px;background:var(--red-dim);border-radius:8px}

/* DASH */
#screen-dash{display:none;flex-direction:column;min-height:calc(100vh - 60px)}
.dash-body{flex:1;padding:16px 20px;display:flex;flex-direction:column;gap:12px}
.profile-card{background:var(--s1);border:1px solid var(--border);border-radius:var(--r2);padding:14px;display:flex;align-items:center;gap:12px}
.avatar{width:42px;height:42px;border-radius:50%;background:var(--accent-dim);border:2px solid var(--accent);color:var(--accent);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:15px;flex-shrink:0}
.profile-name{font-size:14px;font-weight:700}
.profile-sub{font-size:11px;color:var(--text2);margin-top:2px}
.status-btns{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.status-btn{padding:10px;border-radius:9px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:var(--s2);color:var(--text2);font-family:var(--font);transition:all .2s;text-align:center}
.status-btn.on-green{background:var(--accent-dim);border-color:rgba(0,212,160,.4);color:var(--accent)}
.status-btn.on-yellow{background:var(--yellow-dim);border-color:rgba(255,209,102,.4);color:var(--yellow)}

/* STEPS */
.step-indicator{display:flex;align-items:center;gap:6px;margin-bottom:14px}
.step-dot{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;border:1.5px solid}
.step-dot.done{background:var(--accent-dim);border-color:var(--accent);color:var(--accent)}
.step-dot.active{background:var(--orange);border-color:var(--orange);color:#fff}
.step-dot.wait{background:var(--s2);border-color:var(--border);color:var(--text3)}
.step-line{flex:1;height:1.5px;background:var(--border)}
.step-line.done{background:var(--accent)}

/* ENTREGA BANNER */
.corrida-banner{background:var(--s2);border:1.5px solid var(--accent);border-radius:var(--r2);padding:18px;position:relative;overflow:hidden}
.corrida-banner::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--accent),transparent);animation:sweep 2s infinite}
@keyframes sweep{0%{transform:translateX(-100%);opacity:0}50%{opacity:1}100%{transform:translateX(100%);opacity:0}}
.ctag{display:inline-block;font-size:10px;font-weight:800;padding:3px 10px;border-radius:20px;letter-spacing:1px;text-transform:uppercase;margin-bottom:12px}
.ctag-green{background:var(--accent);color:#060a0a}
.ctag-orange{background:var(--orange);color:#fff}
.c-title{font-size:18px;font-weight:800;letter-spacing:-.3px;margin-bottom:10px}
.info-row{display:flex;align-items:flex-start;gap:8px;margin-bottom:8px}
.info-ico{font-size:15px;flex-shrink:0;line-height:1.4}
.info-content{font-size:13px;color:var(--text2);line-height:1.5}
.info-content strong{color:var(--text);display:block;font-size:14px;font-weight:700}

.actions-row{display:grid;grid-template-columns:1fr auto;gap:8px;margin-top:14px}
.btn-recusar{background:transparent;border:1px solid var(--border);color:var(--text2);border-radius:9px;padding:0 16px;font-size:13px;cursor:pointer;font-family:var(--font);transition:all .2s;white-space:nowrap}
.btn-recusar:hover{border-color:var(--red);color:var(--red)}

/* FASES */
.fase-card{border-radius:var(--r2);padding:18px}
.fase-coleta{background:var(--s2);border:1.5px solid var(--orange)}
.fase-entrega{background:var(--s2);border:1.5px solid var(--purple)}
.maps-link{display:flex;align-items:center;justify-content:center;gap:6px;text-decoration:none;background:var(--blue-dim);border:1px solid rgba(77,159,255,.3);color:var(--blue);border-radius:9px;padding:10px;font-size:13px;font-weight:600;margin:12px 0;font-family:var(--font)}
.idle-state{text-align:center;padding:32px 20px;color:var(--text3)}
.idle-ico{font-size:40px;opacity:.25;margin-bottom:10px}

/* RELATÓRIO */
.sec-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--text3);margin-bottom:10px}
.rel-box{background:var(--s2);border:1px solid var(--border);border-radius:var(--r);padding:14px;margin-bottom:10px}
.rel-row{display:flex;justify-content:space-between;align-items:flex-start;padding:8px 0;border-bottom:1px solid var(--border)}
.rel-row:last-child{border-bottom:none}
.rel-k{font-size:13px;color:var(--text2)}
.rel-v{font-size:13px;font-weight:700;color:var(--text);text-align:right}
.rel-sub{font-size:11px;color:var(--text3);margin-top:2px}
.pend-badge{display:inline-block;background:var(--yellow-dim);color:var(--yellow);border:1px solid rgba(255,209,102,.3);padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700}
.pago-badge{display:inline-block;background:var(--accent-dim);color:var(--accent);border:1px solid rgba(0,212,160,.3);padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700}
.periodo-btns{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
.periodo-btn{padding:6px 11px;border-radius:7px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:var(--s2);color:var(--text2);font-family:var(--font);transition:all .2s}
.periodo-btn:hover{color:var(--text);border-color:var(--border2)}
.date-inputs{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.date-inputs input{background:var(--s2);border:1px solid var(--border);border-radius:8px;padding:9px 10px;color:var(--text);font-family:var(--font);font-size:12px;outline:none;width:100%}
.date-inputs input:focus{border-color:var(--accent)}
.btn-gerar{display:flex;align-items:center;justify-content:center;padding:10px;border-radius:9px;font-size:13px;font-weight:600;cursor:pointer;border:none;background:var(--accent);color:#060a0a;font-family:var(--font);width:100%;margin-bottom:14px}

/* TABS */
.tabs-bottom{display:flex;background:var(--s1);border-top:1px solid var(--border)}
.tab-btn{flex:1;padding:12px 8px;font-size:11px;font-weight:600;color:var(--text2);cursor:pointer;border:none;background:transparent;font-family:var(--font);border-top:2px solid transparent;transition:all .2s}
.tab-btn.active{color:var(--accent);border-top-color:var(--accent)}
.screen-inner{display:none;flex-direction:column;gap:12px}
.screen-inner.active{display:flex}
</style>
</head>
<body>

<header>
  <div class="logo">GG <span>Express</span></div>
  <div id="header-status" style="font-size:12px;color:var(--text2)">Motoboy</div>
</header>

<!-- LOGIN -->
<div id="screen-login">
  <div class="login-hero">
    <span class="hero-ico">🛵</span>
    <div class="hero-title">GG Express</div>
    <div class="hero-sub">Acesso do motoboy</div>
  </div>
  <div class="card">
    <div id="login-err" class="err-msg"></div>
    <div class="field"><label>Usuário</label><input type="text" id="inp-usuario" placeholder="Seu usuário de acesso" autocomplete="username"></div>
    <div class="field"><label>Senha</label><input type="password" id="inp-senha" placeholder="••••••••" autocomplete="current-password" onkeydown="if(event.key==='Enter')entrar()"></div>
    <button class="btn btn-accent" onclick="entrar()">Entrar</button>
  </div>
</div>

<!-- DASHBOARD -->
<div id="screen-dash">
  <div class="dash-body">

    <div class="screen-inner active" id="inner-entregas">
      <div class="profile-card">
        <div class="avatar" id="dash-avatar">?</div>
        <div style="flex:1">
          <div class="profile-name" id="dash-nome">—</div>
          <div class="profile-sub" id="dash-status-txt"></div>
        </div>
        <button class="btn-ghost" onclick="sair()">Sair</button>
      </div>

      <button class="btn btn-ghost" id="btn-notificacoes" style="width:100%;display:none" onclick="ativarNotificacoes()">🔔 Ativar notificações</button>

      <div class="status-btns" id="status-btns-wrap">
        <div class="status-btn" id="btn-disp" onclick="setStatus('disponivel')">● Disponível</div>
        <div class="status-btn" id="btn-pausa" onclick="setStatus('pausa')">⏸ Pausa</div>
      </div>

      <div id="sec-corrida"></div>
      <div id="sec-coleta"></div>
      <div id="sec-entrega"></div>
      <div id="sec-idle"></div>
    </div>

    <!-- RELATÓRIO SEMANAL -->
    <div class="screen-inner" id="inner-relatorio">
      <div class="sec-title">Meus ganhos</div>

      <div class="periodo-btns">
        <button class="periodo-btn" onclick="mPeriodo('semana-atual')">Semana atual</button>
        <button class="periodo-btn" onclick="mPeriodo('semana-passada')">Semana passada</button>
        <button class="periodo-btn" onclick="mPeriodo('mes')">Este mês</button>
      </div>
      <div class="date-inputs">
        <input type="date" id="m-ini" placeholder="De">
        <input type="date" id="m-fim" placeholder="Até">
      </div>
      <button class="btn-gerar" onclick="renderRelatorio()">Gerar relatório</button>

      <div id="moto-relatorio"><div class="idle-state"><div class="idle-ico">📊</div><div style="font-size:13px">Selecione um período</div></div></div>
    </div>

  </div>

  <div class="tabs-bottom">
    <button class="tab-btn active" onclick="showInner('entregas',this)">Entregas</button>
    <button class="tab-btn" onclick="showInner('relatorio',this)">Meus ganhos</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, update, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
import firebaseConfig from "./firebase-config.js";

const app = initializeApp(firebaseConfig);
const db  = getDatabase(app);

let motoAtual = JSON.parse(localStorage.getItem('motoAtual')||'null');
const REPASSE_MOTOBOY = 7.5;
const SW_PATH = './ggexpress-sw.js';
let statusAtual = 'disponivel';
let corridasVistas = new Set();
let corridasNotificadas = new Set();
let swRegistration = null;
let alarmInterval = null;
let todasEntregas = [];

// ── LOGIN ─────────────────────────────────────────────────
window.entrar = async function() {
  const usuario = document.getElementById('inp-usuario').value.trim().toLowerCase();
  const senha   = document.getElementById('inp-senha').value;
  if (!usuario||!senha) { showErr('Preencha usuário e senha'); return; }

  let found = null;
  await new Promise(res => {
    onValue(ref(db,'motoboys'), snap => {
      const d = snap.val()||{};
      const match = Object.entries(d).map(([id,v])=>({id,...v}))
        .find(m => m.usuario === usuario && m.senha === senha);
      if (match) found = match;
      res();
    }, {onlyOnce:true});
  });

  if (!found) { showErr('Usuário ou senha incorretos'); return; }
  if (found.online) { showErr('Este usuário já está online em outro dispositivo'); return; }

  const statusInicial = found.status==='pausa' ? 'pausa' : 'disponivel';
  motoAtual = {id: found.id, nome: found.nome, tel: found.tel||'', pix: found.pix||'', status: statusInicial};
  localStorage.setItem('motoAtual', JSON.stringify(motoAtual));
  await update(ref(db,'motoboys/'+found.id), {online:true, status:statusInicial});
  iniciarDash(statusInicial);
};

window.sair = async function() {
  pararAlarme();
  if (motoAtual) {
    await update(ref(db,'motoboys/'+motoAtual.id), {online:false, status:'offline'});
    localStorage.removeItem('motoAtual');
    motoAtual = null;
  }
  document.getElementById('screen-login').style.display='flex';
  document.getElementById('screen-dash').style.display='none';
  document.getElementById('inp-usuario').value='';
  document.getElementById('inp-senha').value='';
};

// ── STATUS ────────────────────────────────────────────────
window.setStatus = function(s) {
  if (statusAtual==='ocupado') return;
  statusAtual = s;
  motoAtual.status = s;
  localStorage.setItem('motoAtual', JSON.stringify(motoAtual));
  update(ref(db,'motoboys/'+motoAtual.id), {status:s});
  renderToggle(s);
  if (s==='pausa') pararAlarme();
};

function renderToggle(s) {
  const ini = motoAtual.nome.split(' ').map(x=>x[0]).join('').slice(0,2).toUpperCase();
  document.getElementById('dash-avatar').textContent = ini;
  document.getElementById('dash-nome').textContent = motoAtual.nome;
  const statusTxt = s==='disponivel'?'🟢 Disponível':s==='pausa'?'⏸ Em pausa':'🟡 Em entrega';
  document.getElementById('dash-status-txt').textContent = statusTxt;
  document.getElementById('header-status').textContent = s==='disponivel'?'🟢 Online':s==='pausa'?'⏸ Pausa':'🟡 Em serviço';
  document.getElementById('btn-disp').className = 'status-btn'+(s==='disponivel'?' on-green':'');
  document.getElementById('btn-pausa').className = 'status-btn'+(s==='pausa'?' on-yellow':'');
}


async function registrarServiceWorker() {
  if (!('serviceWorker' in navigator)) return null;
  try {
    swRegistration = await navigator.serviceWorker.register(SW_PATH);
    return swRegistration;
  } catch (e) {
    console.warn('Falha ao registrar service worker:', e);
    return null;
  }
}

function atualizarBotaoNotificacao() {
  const btn = document.getElementById('btn-notificacoes');
  if (!btn) return;
  if (!('Notification' in window)) {
    btn.style.display = 'none';
    return;
  }
  if (Notification.permission === 'granted') {
    btn.style.display = 'none';
  } else {
    btn.style.display = 'flex';
  }
}

window.ativarNotificacoes = async function() {
  if (!('Notification' in window)) {
    alert('Este navegador não suporta notificações do sistema.');
    return;
  }
  await registrarServiceWorker();
  const perm = await Notification.requestPermission();
  atualizarBotaoNotificacao();
  if (perm === 'granted') {
    toast('Notificações ativadas!');
  } else {
    toast('Permissão de notificação não concedida','err');
  }
};

async function notificarSistema(pedido) {
  if (!('Notification' in window) || Notification.permission !== 'granted') return;
  await registrarServiceWorker();
  const titulo = 'Nova entrega disponível';
  const corpo = `${pedido.restNome||'Empresa'} • ${pedido.itens||'Pedido'}`
  const options = {
    body: corpo,
    tag: `pedido-${pedido.id}`,
    renotify: true,
    data: { url: location.href, pedidoId: pedido.id }
  };
  try {
    if (swRegistration && swRegistration.showNotification) {
      await swRegistration.showNotification(titulo, options);
    } else {
      new Notification(titulo, options);
    }
  } catch (e) {
    console.warn('Falha ao exibir notificação:', e);
  }
}

// ── ALARME ────────────────────────────────────────────────
function iniciarAlarme(disponiveis) {
  if (!disponiveis.length || statusAtual!=='disponivel') return;
  if (!alarmInterval) {
    notificar();
    alarmInterval = setInterval(() => {
      if (!disponiveis.length || statusAtual!=='disponivel') { pararAlarme(); return; }
      notificar();
    }, 5000);
  }
}
function pararAlarme() {
  if (alarmInterval) { clearInterval(alarmInterval); alarmInterval=null; }
}
function notificar() {
  if(navigator.vibrate) navigator.vibrate([400,100,400,100,400]);
  try {
    const ctx=new AudioContext(),osc=ctx.createOscillator(),g=ctx.createGain();
    osc.connect(g);g.connect(ctx.destination);
    osc.frequency.setValueAtTime(880,ctx.currentTime);
    osc.frequency.setValueAtTime(1100,ctx.currentTime+.15);
    osc.frequency.setValueAtTime(880,ctx.currentTime+.3);
    osc.frequency.setValueAtTime(1100,ctx.currentTime+.45);
    g.gain.setValueAtTime(.5,ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+.7);
    osc.start();osc.stop(ctx.currentTime+.7);
  } catch(e){}
}

// ── INICIAR ───────────────────────────────────────────────
async function iniciarDash(statusInicial = (motoAtual?.status||'disponivel')) {
  await registrarServiceWorker();
  atualizarBotaoNotificacao();
  document.getElementById('screen-login').style.display='none';
  document.getElementById('screen-dash').style.display='flex';
  document.getElementById('screen-dash').style.flexDirection='column';
  document.getElementById('screen-dash').style.minHeight='calc(100vh - 60px)';
  statusAtual = statusInicial === 'pausa' ? 'pausa' : 'disponivel';
  renderToggle(statusAtual);

  onValue(ref(db,'pedidos'), snap => {
    const d = snap.val()||{};
    const todos = Object.entries(d).map(([id,v])=>({id,...v}));

    const disponiveis = todos.filter(p=>p.status==='chamando'&&!p.motoId);
    const emColeta    = todos.find(p=>p.status==='em-coleta'&&p.motoId===motoAtual.id);
    const emEntrega   = todos.find(p=>p.status==='em-rota'&&p.motoId===motoAtual.id);

    todasEntregas = todos.filter(p=>p.status==='entregue'&&p.motoId===motoAtual.id);

    if (statusAtual==='disponivel') {
      const novasCorridas = disponiveis.filter(p=>!corridasNotificadas.has(p.id));
      novasCorridas.forEach(p=>{
        corridasNotificadas.add(p.id);
        notificarSistema(p);
      });
      if (disponiveis.length>0) {
        iniciarAlarme(disponiveis);
      } else {
        pararAlarme();
      }
    } else {
      pararAlarme();
    }

    renderPrincipal(disponiveis, emColeta, emEntrega);
  });
}

// ── RENDER PRINCIPAL ──────────────────────────────────────
function renderPrincipal(disponiveis, emColeta, emEntrega) {
  const corrEl=document.getElementById('sec-corrida');
  const colEl=document.getElementById('sec-coleta');
  const entEl=document.getElementById('sec-entrega');
  const idleEl=document.getElementById('sec-idle');
  corrEl.innerHTML='';colEl.innerHTML='';entEl.innerHTML='';idleEl.innerHTML='';

  if (emColeta) {
    statusAtual='ocupado'; renderToggle('ocupado');
    const mapsUrl=`https://www.google.com/maps/dir/?api=1&destination=${encodeURIComponent(emColeta.restEndereco||'')}`;
    colEl.innerHTML=`
      <div class="fase-card fase-coleta">
        ${stepBar(1)}
        <div class="c-title">${emColeta.restNome}</div>
        <div class="info-row"><span class="info-ico">📍</span><div class="info-content"><strong>Endereço da empresa</strong>${emColeta.restEndereco||'—'}</div></div>
        <div class="info-row"><span class="info-ico">📦</span><div class="info-content">${emColeta.itens}</div></div>
        <div class="info-row"><span class="info-ico">👤</span><div class="info-content">Pedido de: <strong>${emColeta.cliente}</strong></div></div>
        <a href="${mapsUrl}" target="_blank" class="maps-link">🗺 Navegar até a empresa · ver tempo e distância</a>
        <div style="font-size:12px;color:var(--text3);text-align:center;margin-bottom:10px">O Google Maps mostrará distância e tempo com trânsito</div>
        <button class="btn btn-orange" onclick="confirmarColeta('${emColeta.id}')">✓ Peguei o pedido</button>
      </div>`;
    return;
  }

  if (emEntrega) {
    statusAtual='ocupado'; renderToggle('ocupado');
    const mapsUrl=`https://www.google.com/maps/dir/?api=1&destination=${encodeURIComponent(emEntrega.endereco||'')}`;
    entEl.innerHTML=`
      <div class="fase-card fase-entrega">
        ${stepBar(2)}
        <div class="c-title">${emEntrega.cliente}</div>
        <div class="info-row"><span class="info-ico">📍</span><div class="info-content"><strong>Endereço do cliente</strong>${emEntrega.endereco}</div></div>
        <div class="info-row"><span class="info-ico">📦</span><div class="info-content">${emEntrega.itens}</div></div>
        <a href="${mapsUrl}" target="_blank" class="maps-link">🗺 Navegar até o cliente · ver tempo e distância</a>
        <div style="font-size:12px;color:var(--text3);text-align:center;margin-bottom:10px">O Google Maps mostrará distância e tempo com trânsito</div>
        <button class="btn btn-purple" onclick="confirmarEntrega('${emEntrega.id}')">✓ Entregue ao cliente!</button>
      </div>`;
    return;
  }

  if (statusAtual==='pausa') {
    idleEl.innerHTML=`<div class="idle-state"><div class="idle-ico">⏸</div><div style="font-size:14px">Você está em pausa</div></div>`;
    return;
  }
  if (!disponiveis.length) {
    if (statusAtual==='ocupado') {
      statusAtual='disponivel';
      motoAtual.status='disponivel';
      localStorage.setItem('motoAtual', JSON.stringify(motoAtual));
      renderToggle('disponivel');
    }
    idleEl.innerHTML=`<div class="idle-state"><div class="idle-ico">🛵</div><div style="font-size:14px">${statusAtual==='pausa'?'Você está em pausa':'Aguardando entregas...'}</div></div>`;
    return;
  }

  corrEl.innerHTML = disponiveis.map(p=>{
    return `
    <div class="corrida-banner">
      <div class="ctag ctag-green">Nova entrega!</div>
      ${stepBar(0)}
      <div class="info-row"><span class="info-ico">🏪</span><div class="info-content"><strong>${p.restNome||'Empresa'}</strong>${p.restEndereco||''}</div></div>
      <div class="info-row"><span class="info-ico">📦</span><div class="info-content">${p.itens}</div></div>
      <div class="info-row" style="margin-bottom:0"><span class="info-ico">📍</span><div class="info-content" style="color:var(--text3);font-style:italic">Endereço do cliente liberado após coleta</div></div>
      <a href="https://www.google.com/maps/dir/?api=1&destination=${encodeURIComponent(p.restEndereco||p.restNome||'empresa')}&travelmode=driving" target="_blank" class="maps-link" style="margin:12px 0 8px">
        🗺 Ver rota até a empresa
      </a>
      <div class="actions-row">
        <button class="btn btn-accent" onclick="aceitarEntrega('${p.id}')">✓ Aceitar entrega</button>
        <button class="btn-recusar" onclick="recusar('${p.id}')">Recusar</button>
      </div>
    </div>`;
  }).join('');
}

function stepBar(fase) {
  const s=n=>n<fase?'done':n===fase?'active':'wait';
  const l=n=>n<fase?'done':'';
  const labels=['Aceitar','Coletar','Entregar'];
  return `<div class="step-indicator">
    ${[0,1,2].map((n,i)=>`
      <div class="step-dot ${s(n)}">${n<fase?'✓':n+1}</div>
      ${i<2?`<div class="step-line ${l(n)}"></div>`:''}
    `).join('')}
  </div>
  <div style="display:flex;justify-content:space-between;margin-bottom:14px;margin-top:-6px">
    ${labels.map((lb,i)=>`<div style="font-size:10px;color:${i===fase?'var(--accent)':i<fase?'var(--accent)':'var(--text3)'};font-weight:${i===fase?700:400};flex:1;text-align:${i===0?'left':i===2?'right':'center'}">${lb}</div>`).join('')}
  </div>`;
}

window.aceitarEntrega = async function(pid) {
  pararAlarme();
  await update(ref(db,'pedidos/'+pid),{status:'em-coleta',motoId:motoAtual.id,motoNome:motoAtual.nome});
  await update(ref(db,'motoboys/'+motoAtual.id),{status:'ocupado'});
  statusAtual='ocupado';
  motoAtual.status='ocupado';
  localStorage.setItem('motoAtual', JSON.stringify(motoAtual));
  renderToggle('ocupado');
};
window.confirmarColeta = async function(pid) {
  await update(ref(db,'pedidos/'+pid),{status:'em-rota'});
};
window.confirmarEntrega = async function(pid) {
  await update(ref(db,'pedidos/'+pid),{status:'entregue',entregueEm:Date.now()});
  await update(ref(db,'motoboys/'+motoAtual.id),{status:'disponivel'});
  statusAtual='disponivel';
  motoAtual.status='disponivel';
  localStorage.setItem('motoAtual', JSON.stringify(motoAtual));
  renderToggle('disponivel');
};
window.recusar = function(pid) { corridasVistas.add(pid); corridasNotificadas.add(pid); toast('Corrida ignorada.'); };

// ── RELATÓRIO ─────────────────────────────────────────────
window.mPeriodo = function(p) {
  const hoje=new Date();
  const fmt=d=>d.toISOString().slice(0,10);
  let ini,fim;
  // Semana sab→sex
  const dow=hoje.getDay(); // 0=dom,6=sab
  if (p==='semana-atual') {
    // início: sábado mais recente
    const diasDesideSab = dow===6?0:(dow+1)%7;
    const sab=new Date(hoje); sab.setDate(hoje.getDate()-diasDesideSab);
    const sex=new Date(sab); sex.setDate(sab.getDate()+6);
    ini=fmt(sab); fim=fmt(sex);
  } else if (p==='semana-passada') {
    const diasDesideSab = dow===6?0:(dow+1)%7;
    const sabAtual=new Date(hoje); sabAtual.setDate(hoje.getDate()-diasDesideSab);
    const sabAnt=new Date(sabAtual); sabAnt.setDate(sabAtual.getDate()-7);
    const sexAnt=new Date(sabAnt); sexAnt.setDate(sabAnt.getDate()+6);
    ini=fmt(sabAnt); fim=fmt(sexAnt);
  } else if (p==='mes') {
    ini=fmt(new Date(hoje.getFullYear(),hoje.getMonth(),1)); fim=fmt(hoje);
  }
  document.getElementById('m-ini').value=ini;
  document.getElementById('m-fim').value=fim;
  renderRelatorio();
};

window.renderRelatorio = function() {
  const iniStr=document.getElementById('m-ini').value;
  const fimStr=document.getElementById('m-fim').value;

  let hist=[...todasEntregas];
  if (iniStr) hist=hist.filter(p=>(p.criadoEm||0)>=new Date(iniStr+'T00:00:00').getTime());
  if (fimStr) hist=hist.filter(p=>(p.criadoEm||0)<=new Date(fimStr+'T23:59:59').getTime());

  const total=hist.reduce((s,p)=>s+Number(p.taxaMotoboy||REPASSE_MOTOBOY),0);
  const totalPago=hist.filter(p=>p.motoPago).reduce((s,p)=>s+Number(p.taxaMotoboy||REPASSE_MOTOBOY),0);
  const totalPend=total-totalPago;
  const periodo=iniStr&&fimStr?`${iniStr.split('-').reverse().join('/')} a ${fimStr.split('-').reverse().join('/')}`:'todo o período';

  if (!hist.length) {
    document.getElementById('moto-relatorio').innerHTML=`<div class="idle-state"><div class="idle-ico">📋</div><div style="font-size:13px">Nenhuma entrega no período</div></div>`;
    return;
  }

  // Agrupa por empresa
  const porRest={};
  hist.forEach(p=>{
    const k=p.restId||'?';
    if(!porRest[k]) porRest[k]={nome:p.restNome||'?',qtd:0,ganhos:0,pago:0};
    porRest[k].qtd++;
    porRest[k].ganhos+=Number(p.taxaMotoboy||REPASSE_MOTOBOY);
    if(p.motoPago) porRest[k].pago+=Number(p.taxaMotoboy||REPASSE_MOTOBOY);
  });

  document.getElementById('moto-relatorio').innerHTML=`
    <div class="rel-box">
      <div class="rel-row"><span class="rel-k">Período</span><span class="rel-v" style="font-size:11px">${periodo}</span></div>
      <div class="rel-row"><span class="rel-k">Total de entregas</span><span class="rel-v">${hist.length}</span></div>
      <div class="rel-row"><span class="rel-k">Total a receber</span><span class="rel-v" style="color:var(--accent)">R$ ${total.toFixed(2).replace('.',',')}</span></div>
      <div class="rel-row">
        <span class="rel-k">Status do pagamento</span>
        <div style="text-align:right">
          ${totalPago>0?`<div style="color:var(--accent);font-weight:700">R$ ${totalPago.toFixed(2).replace('.',',')} <span class="pago-badge">pago</span></div>`:''}
          ${totalPend>0?`<div style="color:var(--yellow);font-weight:700">R$ ${totalPend.toFixed(2).replace('.',',')} <span class="pend-badge">pendente</span></div>`:''}
        </div>
      </div>
    </div>
    <div class="sec-title">Por empresa</div>
    <div class="rel-box">
      ${Object.values(porRest).map(r=>`
        <div class="rel-row">
          <div>
            <div class="rel-k" style="font-weight:600;color:var(--text)">${r.nome}</div>
            <div class="rel-sub">${r.qtd} entrega${r.qtd>1?'s':''}</div>
          </div>
          <div style="text-align:right">
            <div class="rel-v" style="color:var(--accent)">R$ ${r.ganhos.toFixed(2).replace('.',',')}</div>
            ${r.pago>0?`<div class="rel-sub"><span class="pago-badge">R$ ${r.pago.toFixed(2).replace('.',',')} pago</span></div>`:''}
          </div>
        </div>`).join('')}
    </div>
    <div class="sec-title">Detalhe por entrega</div>
    <div class="rel-box">
      ${[...hist].reverse().map(p=>{
        const dt=new Date(p.criadoEm);
        const dtFmt=dt.toLocaleDateString('pt-BR')+' '+dt.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
        return `<div class="rel-row">
          <div><div class="rel-k">${p.cliente}</div><div class="rel-sub">${p.restNome||'—'} · ${dtFmt}</div></div>
          <div style="text-align:right">
            <div class="rel-v" style="color:var(--accent)">R$ ${Number(p.taxaMotoboy||REPASSE_MOTOBOY).toFixed(2).replace('.',',')}</div>
            <div>${p.motoPago?'<span class="pago-badge">pago</span>':'<span class="pend-badge">pendente</span>'}</div>
          </div>
        </div>`;
      }).join('')}
    </div>`;
};

window.showInner = function(s,el) {
  document.querySelectorAll('.screen-inner').forEach(x=>x.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(x=>x.classList.remove('active'));
  document.getElementById('inner-'+s).classList.add('active');
  el.classList.add('active');
};

function showErr(msg) {
  const el=document.getElementById('login-err');
  el.textContent=msg; el.style.display='block';
  setTimeout(()=>el.style.display='none',4000);
}

// Auto-login
if (motoAtual) {
  onValue(ref(db,'motoboys/'+motoAtual.id), snap=>{
    const dados = snap.val();
    if (dados && !dados.online) {
      const statusRecuperado = dados.status==='pausa' ? 'pausa' : 'disponivel';
      motoAtual = {...motoAtual, nome:dados.nome||motoAtual.nome, tel:dados.tel||'', pix:dados.pix||'', status:statusRecuperado};
      localStorage.setItem('motoAtual', JSON.stringify(motoAtual));
      update(ref(db,'motoboys/'+motoAtual.id),{online:true,status:statusRecuperado});
      iniciarDash(statusRecuperado);
    } else if (!dados) {
      localStorage.removeItem('motoAtual');
      motoAtual=null;
      document.getElementById('screen-login').style.display='flex';
    } else {
      const statusRecuperado = dados.status==='pausa' ? 'pausa' : (dados.status==='ocupado' ? 'ocupado' : 'disponivel');
      motoAtual = {...motoAtual, nome:dados.nome||motoAtual.nome, tel:dados.tel||'', pix:dados.pix||'', status:statusRecuperado};
      localStorage.setItem('motoAtual', JSON.stringify(motoAtual));
      iniciarDash(statusRecuperado);
    }
  },{onlyOnce:true});
} else {
  document.getElementById('screen-login').style.display='flex';
}
</script>
